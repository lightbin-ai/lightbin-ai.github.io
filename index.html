<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightbin</title>
  <link rel="icon" href="lightbin.ico" type="image/x-icon">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #040007;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 48px 20px;
    }
    .logo-text {
      font-size: 40px;
      font-weight: 700;
      color: #d4bae7;
      letter-spacing: -1px;
      user-select: none;
    }
    .content {
      width: min(912px, 100%);
      text-align: center;
      font-size: 16px;
      line-height: 2;
      color: #f1ecf7;
    }
    .content a {
      color: #f1ecf7;
      text-decoration: underline;
    }
    @media (max-width: 600px) {
      .logo-text { font-size: 28px; }
      .content { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo-text">Lightbin</div>
    <div class="content">
      <video autoplay loop muted playsinline
        style="
          display: block;
          width: 100%;
          border-radius: 16px;
          border: 1px solid rgba(0, 0, 0, 0.9);
          box-shadow: 0 8px 12px -2px rgba(180, 130, 220, 0.2);
          margin-bottom: 28px;
        ">
        <source src="demo_recording.mov" type="video/mp4">
      </video>
      Request tool access by contacting <a href="mailto:me@willrodman.com">me@willrodman.com</a>.<br>
      Once access is provisioned, click "Enable Model Connection."<br>
      Wait 10 minutes.<br>
      Connect Chatbot to MCP at <a href="https://connect.lightbin.ai/mcp">https://connect.lightbin.ai/mcp</a>
      <button id="enable-btn" onclick="startOAuth()"
        style="
          background: #333;
          color: #f1ecf7;
          border: none;
          padding: 14px 32px;
          font-size: 16px;
          font-family: 'Inter', system-ui, sans-serif;
          font-weight: 600;
          border-radius: 8px;
          cursor: pointer;
          margin-top: 24px;
          display: block;
          margin-left: auto;
          margin-right: auto;
        "
        onmouseover="this.style.background='#444'"
        onmouseout="this.style.background='#333'"
      >Enable Model Connection</button>
    </div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = '741579612442-00vvrrc0einle9varb96qd1gqsppk6j9.apps.googleusercontent.com';
    const REDIRECT_URI = 'https://lightbin.ai';
    const BACKEND_URL = 'https://storage-api-lmun53eora-uc.a.run.app';
    const SCOPES = 'openid https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.email';

    function startOAuth() {
      const params = new URLSearchParams({
        client_id: GOOGLE_CLIENT_ID,
        redirect_uri: REDIRECT_URI,
        response_type: 'code',
        scope: SCOPES,
        access_type: 'offline',
        prompt: 'consent',
      });
      window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
    }

    (function handleRedirect() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if (!code) return;

      window.history.replaceState({}, document.title, '/');

      var btn = document.getElementById('enable-btn');
      btn.disabled = true;
      btn.textContent = 'Request Submitted';
      btn.style.cursor = 'default';
      btn.style.opacity = '0.5';
      btn.onmouseover = null;
      btn.onmouseout = null;

      fetch(BACKEND_URL + '/onboard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code }),
      }).catch(function() {});
    })();
  </script>
</body>
</html>
